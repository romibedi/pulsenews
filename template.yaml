AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PulseNews API - Express Lambda behind API Gateway

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs20.x
    Architectures:
      - arm64
  Api:
    Cors:
      AllowOrigin: "'*'"
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"

Parameters:
  AnthropicApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Anthropic API key for AI summaries

Resources:
  PulseNewsApi:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.handler
      CodeUri: server/
      Description: PulseNews API - all routes
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          NODE_ENV: production
      Events:
        ApiRoot:
          Type: Api
          Properties:
            Path: /api/{proxy+}
            Method: ANY
        ApiHealth:
          Type: Api
          Properties:
            Path: /api/health
            Method: GET

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt PulseNewsApi.Arn
